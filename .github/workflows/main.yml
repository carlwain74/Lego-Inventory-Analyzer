# central-ops-repo/.github/workflows/dispatcher.yml
name: CI Dispatcher
on:
  pull_request:
    branches:
      - '*'

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-languages:
    runs-on: ubuntu-latest
    outputs:
      has_python: ${{ steps.detect.outputs.has_python }}
      python_version: ${{ steps.detect.outputs.python_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Detect languages and versions
        id: detect
        run: |
          HAS_PYTHON=false
          PYTHON_VERSION="3.11"

          if find . \( -name "requirements*.txt" -o -name "setup.py" \
              -o -name "setup.cfg" -o -name "pyproject.toml" \
              -o -name "Pipfile" \) \
             -not -path "*/node_modules/*" -not -path "*/.venv/*" \
             2>/dev/null | grep -q .; then
            HAS_PYTHON=true
            # pyproject.toml: requires-python = ">=3.11"
            PY_VER=$(grep -h -oP '(?<=requires-python\s=\s")[^"]+|(?<=python_requires\s=\s")[^"]+' \
              $(find . \( -name "pyproject.toml" -o -name "setup.cfg" -o -name "setup.py" \) \
                -not -path "*/.venv/*" 2>/dev/null) 2>/dev/null \
              | grep -oP '\d+\.\d+' | head -1)
            # .python-version file takes priority
            if [ -f ".python-version" ]; then
              PY_VER=$(cat .python-version | tr -d '[:space:]')
            fi
            [ -n "$PY_VER" ] && PYTHON_VERSION="$PY_VER"
          fi

          echo "has_python=$HAS_PYTHON"     >> "$GITHUB_OUTPUT"
          echo "python_version=$PYTHON_VERSION" >> "$GITHUB_OUTPUT"

          echo "──────────── Detection Results ────────────"
          echo "Python : $HAS_PYTHON (v$PYTHON_VERSION)"

