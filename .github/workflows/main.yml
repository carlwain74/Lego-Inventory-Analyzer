name: Post Push Details to PR
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  comment-push-details:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const pusher = context.actor;
            const commitSha = context.sha;
            
            const body = `### 🚀 New Push Details
            - **Pushed by:** @${pusher}
            - **Commit SHA:** \`${commitSha}\`
            - **Workflow Run:** [View Details](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${context.runId})`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });
      - name: checkout code
        uses: actions/checkout@v4
      - name: detect language version
        id: detect
        run: |
          if [ -f "pom.xml" ]; then
            V=$(mvn help:evaluate -Dexpression=maven.compiler.release -q -DforceStdout | grep -v '\[')
            [[ "$V" == "null" ]] && V=$(mvn help:evaluate -Dexpression=maven.compiler.target -q -DforceStdout | grep -v '\[')
            echo "lang=maven" >> $GITHUB_OUTPUT
            echo "ver=${V:-17}" >> $GITHUB_OUTPUT
          elif [ -f "go.mod" ]; then
            V=$(grep -E '^go [0-9.]+' go.mod | awk '{print $2}')
            echo "lang=go" >> $GITHUB_OUTPUT
            echo "ver=${V:-1.21}" >> $GITHUB_OUTPUT
          elif [ -f "Pipfile" ] || [ -f "pyproject.toml" ] || [ -f "requirements.txt" ]; then
            if [ -f "Pipfile" ]; then V=$(grep -oP 'python_version\s*=\s*"\K[^"]+' Pipfile)
            elif [ -f "pyproject.toml" ]; then V=$(grep -oP 'requires-python\s*=\s*"\D*\K[0-9.]+' pyproject.toml)
            fi
            echo "lang=python" >> $GITHUB_OUTPUT
            echo "ver=${V:-3.10}" >> $GITHUB_OUTPUT
          fi      
      - name: coverage check
        uses: actions/setup-python@v5
        with: 
          python-version: $ver
      - name: Install & Test
        run: |
            pip install pipenv
            pipenv sync --dev
            pipenv run pytest --cov=./ --cov-report=xml --cov-fail-under=80
      - uses: MishaKav/pytest-coverage-comment@v1.1.51
        with: { pytest-xml-coverage-path: ./coverage.xml, title: "Python Coverage" }

