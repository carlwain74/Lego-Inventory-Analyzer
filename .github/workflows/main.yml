name: Post Push Details to PR
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  comment-push-details:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const pusher = context.actor;
            const commitSha = context.sha;
            
            const body = `### 🚀 New Push Details
            - **Pushed by:** @${pusher}
            - **Commit SHA:** \`${commitSha}\`
            - **Workflow Run:** [View Details](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${context.runId})`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: body
            });
      - name: checkout code
        uses: actions/checkout@v4
      - name: coverage check
        uses: actions/setup-python@v5
        with: { python-version: 3.12}
      - name: Install & Test
        run: |
            pip install pipenv
            pipenv install --dev
            pytest --cov=./ --cov-report=xml --cov-fail-under=80
      - uses: MishaKav/pytest-coverage-comment@v1.1.51
        with: { pytest-xml-coverage-path: ./coverage.xml, title: "Python Coverage" }

