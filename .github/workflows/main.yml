# central-ops-repo/.github/workflows/dispatcher.yml
name: CI Dispatcher
on:
  push:
permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

jobs:
  initialize:
    runs-on: ubuntu-latest
    outputs:
      lang: ${{ steps.detect.outputs.lang }}
      ver: ${{ steps.detect.outputs.ver }}
    steps:
      - uses: actions/checkout@v4

      - id: detect
        run: |
          if [ -f "pom.xml" ]; then
            V=$(mvn help:evaluate -Dexpression=maven.compiler.release -q -DforceStdout | grep -v '\[')
            [[ "$V" == "null" ]] && V=$(mvn help:evaluate -Dexpression=maven.compiler.target -q -DforceStdout | grep -v '\[')
            echo "lang=maven" >> $GITHUB_OUTPUT
            echo "ver=${V:-17}" >> $GITHUB_OUTPUT
          elif [ -f "go.mod" ]; then
            V=$(grep -E '^go [0-9.]+' go.mod | awk '{print $2}')
            echo "lang=go" >> $GITHUB_OUTPUT
            echo "ver=${V:-1.21}" >> $GITHUB_OUTPUT
          elif [ -f "Pipfile" ] || [ -f "pyproject.toml" ] || [ -f "requirements.txt" ]; then
            if [ -f "Pipfile" ]; then V=$(grep -oP 'python_version\s*=\s*"\K[^"]+' Pipfile)
            elif [ -f "pyproject.toml" ]; then V=$(grep -oP 'requires-python\s*=\s*"\D*\K[0-9.]+' pyproject.toml)
            fi
            echo "lang=python" >> $GITHUB_OUTPUT
            echo "ver=${V:-3.10}" >> $GITHUB_OUTPUT
          fi

  #maven:
  #  needs: initialize
  #  if: needs.initialize.outputs.lang == 'maven'
  #  uses: ./.github/workflows/sub-maven.yml
  #  with: 
  #    user: ${{ needs.initialize.outputs.user }}
  #    ver: ${{ needs.initialize.outputs.ver }}

  python:
    needs: initialize
    if: needs.initialize.outputs.lang == 'python'
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: coverage check
        uses: actions/setup-python@v5
        with: 
          python-version: ${{ needs.initialize.outputs.ver }}
      - name: Install & Test
        run: |
            pip install pipenv
            pipenv sync --dev
            pipenv run pytest --cov=./ --cov-report=xml --cov-fail-under=80
      - uses: MishaKav/pytest-coverage-comment@v1.1.51
        with:
          pytest-xml-coverage-path: ./coverage.xml
          title: "Python Coverage"

