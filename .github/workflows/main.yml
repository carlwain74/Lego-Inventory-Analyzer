  python-coverage:
    name: Python Coverage
    needs: detect-languages
    if: needs.detect-languages.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    env:
      COVERAGE_THRESHOLD: 80
    outputs:
      coverage:       ${{ steps.parse.outputs.coverage }}
      passed:         ${{ steps.parse.outputs.passed }}
      coverage_table: ${{ steps.parse.outputs.coverage_table }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with: 
          python-version: ${{ needs.detect-languages.outputs.python_version }}
      - name: Coverage Check Report
        run: |
          pip install pipenv
          pipenv sync --dev
          pipenv run pytest --cov=./ --cov-report=xml --cov-fail-under=80
      #- name: Pytest coverage comment
      #  id: coverage
      #  uses: MishaKav/pytest-coverage-comment@v1.7.2
      #  with:
      #    pytest-xml-coverage-path: ./coverage.xml
      #    title: "Python Coverage"

      - name: Parse Python coverage XML
        id: parse
        run: |
          python3 - coverage.xml "$COVERAGE_THRESHOLD" <<'PYEOF'
          import sys, xml.etree.ElementTree as ET, os

          report_path, threshold = sys.argv[1], int(sys.argv[2])
          tree = ET.parse(report_path)
          root = tree.getroot()

          overall_pct = float(root.get('line-rate', 0)) * 100

          rows = []
          for pkg in root.findall('.//package'):
              for cls in pkg.findall('.//class'):
                  fname = cls.get('filename', '')
                  line_rate = float(cls.get('line-rate', 0))
                  pct = round(line_rate * 100, 1)
                  status = '✅' if pct >= threshold else '❌'
                  rows.append((fname, pct, status))

          passed = round(overall_pct, 1) >= threshold

          table_lines = ['| File | Line Coverage | Status |',
                         '|------|---------------|--------|']
          for fname, pct, st in rows:
              table_lines.append(f'| `{fname}` | {pct}% | {st} |')
          table = '\n'.join(table_lines)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"coverage={round(overall_pct, 1)}\n")
              f.write(f"passed={'true' if passed else 'false'}\n")
              escaped = table.replace('%', '%25').replace('\n', '%0A').replace('\r', '%0D')
              f.write(f"coverage_table={escaped}\n")

          print(f"Overall Python coverage: {round(overall_pct,1)}%  passed={passed}")
          PYEOF


  #go:
  #  needs: initialize
  #  if: needs.initialize.outputs.lang == 'go'
  #  uses: ./.github/workflows/sub-go.yml
