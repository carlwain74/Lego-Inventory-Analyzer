  coverage-report:
    name: Coverage Report & Gate
    needs:
      - detect-languages
      - python-coverage
    # Always run so the comment is posted even when coverage jobs are skipped
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Post PR comment for detected language
        uses: actions/github-script@v7
        env:
          THRESHOLD: "80"
          PY_ENABLED:    ${{ needs.detect-languages.outputs.has_python }}
          PY_VERSION:    ${{ needs.detect-languages.outputs.python_version }}
          PY_COVERAGE:   ${{ needs.python-coverage.outputs.coverage }}
          PY_PASSED:     ${{ needs.python-coverage.outputs.passed }}
          PY_TABLE:      ${{ needs.python-coverage.outputs.coverage_table }}
        with:
          script: |
            const threshold = parseInt(process.env.THRESHOLD);

            // Resolve the single detected language for this PR
            let lang;
            if (process.env.PY_ENABLED === 'true') {
              lang = {
                name:     'Python',
                icon:     '🐍',
                version:  process.env.PY_VERSION,
                coverage: parseFloat(process.env.PY_COVERAGE || '0'),
                passed:   process.env.PY_PASSED === 'true',
                table:    decodeURIComponent(process.env.PY_TABLE || ''),
              };
            }

            // ── Build comment body ──────────────────────────────────────────
            const marker = '<!-- coverage-report-comment -->';
            let body = marker + '\n';

            if (!lang) {
              body += `## ⚠️ Code Coverage — No Supported Language Detected\n\n`;
              body += `No Python project files were found in this PR.\n`;
            } else {
              const icon       = lang.passed ? '✅' : '❌';
              const statusText = lang.passed ? 'PASSED' : 'FAILED';
              const bar        = buildBar(lang.coverage);
    
              body += `## ${icon} Code Coverage — ${statusText}\n\n`;
              body += `| | |\n|---|---|\n`;
              body += `| **Language** | ${lang.icon} ${lang.name} ${lang.version} |\n`;
              body += `| **Coverage** | **${lang.coverage}%** ${bar} |\n`;
              body += `| **Threshold** | ${threshold}% |\n`;
              body += `| **Status** | ${icon} ${statusText} |\n\n`;

              // Per-file breakdown
              body += `<details>\n<summary><strong>### File / Module Breakdown</strong></summary>\n\n`;
              if (lang.table) {
                body += lang.table + '\n';
                body += `\n</details>\n`;
              } else {
                body += '_No per-file breakdown available._\n';
              }

              if (!lang.passed) {
                body += `\n> ⚠️ Coverage is below the **${threshold}%** threshold. `;
                body += `Please add tests to the files marked ❌ above and push again.\n`;
              }
            }

            body += `\n---\n_Generated by [Code Coverage Action](https://github.com/${context.repo.owner}/${context.repo.repo}/actions) · ${new Date().toUTCString()}_`;

            // ── Upsert: update existing comment or create a new one ─────────
            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

            function buildBar(pct) {
              const filled = Math.round(pct / 10);
              return '`' + '█'.repeat(filled) + '░'.repeat(10 - filled) + '`';
            }

      # ── Enforce the gate — fails the check and blocks the PR merge ─────────
      - name: Enforce coverage gate
        env:
          PY_ENABLED:   ${{ needs.detect-languages.outputs.has_python }}
          PY_PASSED:    ${{ needs.python-coverage.outputs.passed }}
        run: |
          if [ "$PY_ENABLED"   = "true" ] && [ "$PY_PASSED"   != "true" ]; then
            echo "❌  Python coverage is below the 80% threshold. Add tests and push again."
            exit 1
          else
            echo "✅  Coverage gate passed."
          fi